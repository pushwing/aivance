<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-sans)}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
.grp{margin-bottom:6px;font-size:12px;color:var(--text-subtle);letter-spacing:.06em;text-transform:uppercase;font-weight:600}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Badge, Alert, Tag } = window.AIvanceDesignSystem_2cbb92;
function Demo(){
  return (
    <div>
      <div className="grp">Badge</div>
      <div className="row">
        <Badge tone="danger">SALE</Badge>
        <Badge tone="ink">NEW</Badge>
        <Badge tone="brand" icon="stars">PICK</Badge>
        <Badge tone="success" variant="soft" icon="check-circle">결제완료</Badge>
        <Badge tone="warning" variant="soft">배송준비</Badge>
        <Badge tone="copia" variant="soft">VIP</Badge>
        <Badge tone="neutral" variant="outline">일반</Badge>
      </div>
      <div className="grp">Tag — filter chips</div>
      <div className="row">
        <Tag as="a" href="#" active>전체</Tag>
        <Tag as="a" href="#">아우터</Tag>
        <Tag as="a" href="#">상의</Tag>
        <Tag accent="copia" active>기획전</Tag>
        <Tag removable>무료배송</Tag>
      </div>
      <div className="grp">Alert</div>
      <div style={{display:'grid',gap:8,maxWidth:560}}>
        <Alert tone="success">주문이 정상적으로 접수되었습니다.</Alert>
        <Alert tone="danger" title="결제 실패" dismissible>카드 정보를 확인한 뒤 다시 시도해 주세요.</Alert>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
