<!-- @dsCard group="Components" viewport="700x360" name="ProductCard & PriceTag" subtitle="Shop grid tile and KRW price display" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.prices{margin-top:16px;display:flex;gap:24px;align-items:center;flex-wrap:wrap}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { ProductCard, PriceTag } = window.AIvanceDesignSystem_2cbb92;
const img = (s) => `https://images.unsplash.com/${s}?w=400&h=400&fit=crop`;
function Demo(){
  return (
    <div>
      <div className="grid">
        <ProductCard name="베이직 코튼 티셔츠" category="상의" price={29000} discountPrice={19900} badge="NEW" image={img('photo-1521572163474-6864f9cf17ab')} />
        <ProductCard name="오버핏 데님 자켓" category="아우터" price={89000} image={img('photo-1544022613-e87ca75a784a')} />
        <ProductCard name="니트 가디건" category="상의" price={54000} discountPrice={43200} image={img('photo-1434389677669-e08b4cac3105')} />
        <ProductCard name="캔버스 스니커즈" category="신발" price={69000} soldOut image={img('photo-1460353581641-37baddab0fa2')} />
      </div>
      <div className="prices">
        <PriceTag price={29000} />
        <PriceTag price={29000} discountPrice={19900} />
        <PriceTag price={89000} discountPrice={62300} showRate size="lg" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
