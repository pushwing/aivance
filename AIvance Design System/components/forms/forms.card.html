<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-sans)}
.row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px}
.grp{margin-bottom:6px;font-size:12px;color:var(--text-subtle);letter-spacing:.06em;text-transform:uppercase;font-weight:600}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Input, Select, Checkbox } = window.AIvanceDesignSystem_2cbb92;
function Demo(){
  return (
    <div>
      <div className="grp">Button — variants</div>
      <div className="row">
        <Button>Primary</Button>
        <Button variant="outline">Outline</Button>
        <Button variant="subtle">Subtle</Button>
        <Button variant="ghost">Ghost</Button>
        <Button variant="dark">Dark</Button>
        <Button disabled>Disabled</Button>
      </div>
      <div className="grp">Accents · sizes · icons · pill</div>
      <div className="row">
        <Button accent="cura">Cura</Button>
        <Button accent="copia">Copia</Button>
        <Button accent="creo">Creo</Button>
        <Button size="sm" iconLeft="plus-lg">담기</Button>
        <Button size="lg" iconRight="arrow-right">시작하기</Button>
        <Button variant="outline" pill>전체</Button>
        <IconButton icon="cart2" label="cart" />
        <IconButton icon="heart" variant="ghost" accent="creo" label="wish" />
      </div>
      <div className="grp">Inputs</div>
      <div className="row" style={{alignItems:'flex-end'}}>
        <div style={{width:200}}><Input label="이메일" icon="envelope" placeholder="you@aivance.kr" /></div>
        <div style={{width:160}}><Select label="정렬" options={['인기순','신상품순','가격순']} /></div>
        <div style={{width:180}}><Input label="비밀번호" type="password" error="8자 이상" /></div>
      </div>
      <div className="row">
        <Checkbox label="할인 상품만" defaultChecked />
        <Checkbox type="radio" name="pg" label="토스페이먼츠" accent="copia" defaultChecked />
        <Checkbox type="radio" name="pg" label="무통장입금" accent="copia" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
