<!-- @dsCard group="Brand" viewport="700x220" name="Voice & Tone" subtitle="How AIvance writes — do / don't" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:22px;font-family:var(--font-sans);background:var(--surface-card);display:flex;gap:16px}
.col{flex:1;border-radius:var(--radius-md);padding:14px 16px;border:1px solid var(--border-default)}
.do{background:var(--success-100)}
.dont{background:var(--danger-100)}
.hd{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.do .hd{color:var(--success-700)}.dont .hd{color:var(--danger-700)}
.q{font-size:14px;line-height:1.55;color:var(--text-body);margin-bottom:8px}
.q b{color:var(--text-strong)}
</style></head><body>
<div class="col do">
  <div class="hd"><i class="bi"></i>✓ AIvance는 이렇게 씁니다</div>
  <div class="q"><b>실제 반복 업무를 대신 처리</b>합니다.</div>
  <div class="q">매출·소진 현황을 <b>매일 AI가 요약</b>해 드립니다.</div>
  <div class="q">3~5일 <b>빠른 납품</b>, 유지보수 가능한 구조.</div>
</div>
<div class="col dont">
  <div class="hd">✕ 이렇게 쓰지 않습니다</div>
  <div class="q">혁신적인 AI로 <b>세상을 바꾸는</b> 미래…</div>
  <div class="q">🚀 게임체인징 차세대 솔루션 ✨</div>
  <div class="q">놀라운 마법 같은 경험을 선사합니다!</div>
</div>
</body></html>
