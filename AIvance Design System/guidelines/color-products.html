<!-- @dsCard group="Colors" viewport="700x170" name="Product Accents" subtitle="AICura teal · AICopia violet · AICreo rose" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:20px;font-family:var(--font-sans);background:var(--surface-card);display:flex;gap:16px}
.card{flex:1;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-card);border:1px solid var(--border-default)}
.bar{height:70px;display:flex;align-items:flex-end;padding:8px 10px;color:#fff;font-family:var(--font-display);font-weight:700;font-size:16px}
.meta{padding:8px 10px}
.role{font-size:12px;color:var(--text-body);font-weight:600}
.hex{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
.tint{display:inline-block;width:14px;height:14px;border-radius:4px;vertical-align:middle;margin-right:4px}
</style></head><body>
<div class="card"><div class="bar" style="background:var(--cura-500)">AICura</div><div class="meta"><div class="role">성형·의료 광고 · care</div><div class="hex"><span class="tint" style="background:var(--cura-50)"></span>#12B3A6 / #0E9488</div></div></div>
<div class="card"><div class="bar" style="background:var(--copia-500)">AICopia</div><div class="meta"><div class="role">이커머스 · abundance</div><div class="hex"><span class="tint" style="background:var(--copia-50)"></span>#7C3AED / #6D28D9</div></div></div>
<div class="card"><div class="bar" style="background:var(--creo-500)">AICreo</div><div class="meta"><div class="role">기업 홈페이지 · create</div><div class="hex"><span class="tint" style="background:var(--creo-50)"></span>#F0568C / #DB2F72</div></div></div>
</body></html>
