<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base grid — space-1 → space-20" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:22px;font-family:var(--font-sans);background:var(--surface-card)}
.r{display:flex;align-items:center;gap:12px;margin-bottom:7px}
.t{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);width:150px;flex:none}
.bar{height:14px;background:var(--brand);border-radius:3px}
</style></head><body>
<div class="r"><span class="t">--space-1 · 4</span><div class="bar" style="width:4px"></div></div>
<div class="r"><span class="t">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
<div class="r"><span class="t">--space-3 · 12</span><div class="bar" style="width:12px"></div></div>
<div class="r"><span class="t">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
<div class="r"><span class="t">--space-6 · 24</span><div class="bar" style="width:24px"></div></div>
<div class="r"><span class="t">--space-8 · 32</span><div class="bar" style="width:32px"></div></div>
<div class="r"><span class="t">--space-12 · 48</span><div class="bar" style="width:48px"></div></div>
<div class="r"><span class="t">--space-20 · 80</span><div class="bar" style="width:80px"></div></div>
</body></html>
