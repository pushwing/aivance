<!-- @dsCard group="Colors" viewport="700x180" name="Brand — AIvance Blue & Signal" subtitle="Primary Advance blue + AI-signal indigo" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:20px;font-family:var(--font-sans);background:var(--surface-card)}
.row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
.sw{flex:1;height:74px;display:flex;align-items:flex-end;padding:6px 8px;color:#fff;font-size:11px;font-weight:600}
.lab{margin:14px 0 6px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-subtle);font-weight:700}
.hex{font-family:var(--font-mono);font-size:10px;opacity:.85;font-weight:500}
</style></head><body>
<div class="lab">Advance Blue — primary</div>
<div class="row">
  <div class="sw" style="background:var(--aiv-blue-50);color:#1e3a8a">50</div>
  <div class="sw" style="background:var(--aiv-blue-100);color:#1e3a8a">100</div>
  <div class="sw" style="background:var(--aiv-blue-300);color:#172554">300</div>
  <div class="sw" style="background:var(--aiv-blue-500)">500<span class="hex">&nbsp;#2563EB</span></div>
  <div class="sw" style="background:var(--aiv-blue-600)">600</div>
  <div class="sw" style="background:var(--aiv-blue-700)">700</div>
  <div class="sw" style="background:var(--aiv-blue-900)">900</div>
</div>
<div class="lab">AI-signal — indigo accent</div>
<div class="row">
  <div class="sw" style="background:var(--aiv-signal-100);color:#4b3dc2">100</div>
  <div class="sw" style="background:var(--aiv-signal-300);color:#4b3dc2">300</div>
  <div class="sw" style="background:var(--aiv-signal-500)">500<span class="hex">&nbsp;#6D5EF6</span></div>
  <div class="sw" style="background:var(--aiv-signal-700)">700</div>
</div>
</body></html>
