<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Slate" subtitle="Text, surfaces & borders — slate 0–900 + ink" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:20px;font-family:var(--font-sans);background:var(--surface-card)}
.row{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
.sw{flex:1;height:80px;display:flex;align-items:flex-end;padding:5px 6px;font-size:10px;font-weight:600}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--slate-0);color:#334155;box-shadow:inset 0 0 0 1px #e2e8f0">0</div>
  <div class="sw" style="background:var(--slate-50);color:#334155">50</div>
  <div class="sw" style="background:var(--slate-100);color:#334155">100</div>
  <div class="sw" style="background:var(--slate-200);color:#334155">200</div>
  <div class="sw" style="background:var(--slate-300);color:#334155">300</div>
  <div class="sw" style="background:var(--slate-400);color:#fff">400</div>
  <div class="sw" style="background:var(--slate-500);color:#fff">500</div>
  <div class="sw" style="background:var(--slate-600);color:#fff">600</div>
  <div class="sw" style="background:var(--slate-700);color:#fff">700</div>
  <div class="sw" style="background:var(--slate-800);color:#fff">800</div>
  <div class="sw" style="background:var(--slate-900);color:#fff">900</div>
  <div class="sw" style="background:var(--ink);color:#fff">ink</div>
</div>
</body></html>
