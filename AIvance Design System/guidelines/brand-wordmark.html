<!-- @dsCard group="Brand" viewport="700x230" name="Wordmark & Product Lockups" subtitle="AIvance parent + AICura/AICopia/AICreo" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:26px;font-family:var(--font-display);background:var(--surface-card)}
.parent{font-size:40px;font-weight:700;letter-spacing:-0.02em;color:var(--text-strong)}
.parent .ai{color:var(--brand)}
.tag{font-family:var(--font-sans);font-size:13px;color:var(--text-muted);margin-top:4px}
.lock{display:flex;gap:14px;margin-top:22px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:8px;padding:9px 15px 9px 12px;border-radius:var(--radius-pill);font-size:17px;font-weight:600;color:#fff}
.dot{font-family:var(--font-sans);font-size:11px;background:rgba(255,255,255,.28);padding:2px 7px;border-radius:var(--radius-pill);font-weight:600}
.ko{font-family:var(--font-sans);font-size:12px;color:var(--text-subtle);margin-top:14px}
</style></head><body>
<div style="display:flex;align-items:center;gap:14px">
<svg width="48" height="48" viewBox="0 0 64 64" fill="none"><path d="M14 46 L30 30 L44 40 L58 20" stroke="var(--brand)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><circle cx="14" cy="46" r="6" fill="var(--brand)"/><circle cx="30" cy="30" r="6" fill="var(--brand)"/><circle cx="44" cy="40" r="6" fill="var(--accent)"/><circle cx="58" cy="20" r="6" fill="var(--accent)"/></svg>
<div class="parent"><span class="ai">AI</span>vance</div>
</div>
<div class="tag">AI + Advance — AI로 업무 효율성을 높이는 실전형 소프트웨어</div>
<div class="lock">
  <span class="chip" style="background:var(--cura-500)">AICura<span class="dot">care</span></span>
  <span class="chip" style="background:var(--copia-500)">AICopia<span class="dot">copia</span></span>
  <span class="chip" style="background:var(--creo-500)">AICreo<span class="dot">creo</span></span>
</div>
<div class="ko">* 로고: Signal Path 마크(우상향 노드) + Space Grotesk 워드마크. 에셋: assets/logo-mark.svg · logo-mark-white.svg · logo-mark-mono.svg</div>
</body></html>
