<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Display → caption, with tokens" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:22px;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-strong)}
.r{display:flex;align-items:baseline;gap:14px;padding:5px 0;border-bottom:1px solid var(--border-subtle)}
.t{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);width:130px;flex:none}
.s{font-family:var(--font-display);letter-spacing:-0.01em}
</style></head><body>
<div class="r"><span class="t">--fs-display 56</span><span class="s" style="font-size:var(--fs-display);font-weight:700">업무를 앞서다</span></div>
<div class="r"><span class="t">--fs-h1 40</span><span class="s" style="font-size:var(--fs-h1);font-weight:700">AI 업무 자동화</span></div>
<div class="r"><span class="t">--fs-h2 32</span><span class="s" style="font-size:var(--fs-h2);font-weight:600">제품 라인업</span></div>
<div class="r"><span class="t">--fs-h3 24</span><span class="s" style="font-size:var(--fs-h3);font-weight:600">AICopia 쇼핑몰</span></div>
<div class="r"><span class="t">--fs-lg 18</span><span style="font-size:var(--fs-lg);font-family:var(--font-sans)">리드 문단 — 실전형 솔루션</span></div>
<div class="r"><span class="t">--fs-base 16</span><span style="font-size:var(--fs-base);font-family:var(--font-sans)">본문 텍스트 · Noto Sans KR</span></div>
<div class="r"><span class="t">--fs-sm 14</span><span style="font-size:var(--fs-sm);font-family:var(--font-sans);color:var(--text-muted)">보조 설명 텍스트</span></div>
<div class="r"><span class="t">--fs-xs 12</span><span style="font-size:var(--fs-xs);font-family:var(--font-sans);color:var(--text-subtle);letter-spacing:.08em;text-transform:uppercase;font-weight:700">LABEL / EYEBROW</span></div>
</body></html>
