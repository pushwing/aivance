<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="success · warning · danger · info (solid + soft)" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:20px;font-family:var(--font-sans);background:var(--surface-card);display:flex;gap:14px}
.col{flex:1}
.solid{height:56px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.soft{height:30px;border-radius:0 0 var(--radius-sm) var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.name{margin-top:6px;font-size:11px;color:var(--text-muted);text-align:center}
.hex{font-family:var(--font-mono);font-size:10px}
</style></head><body>
<div class="col"><div class="solid" style="background:var(--success-500)">success</div><div class="soft" style="background:var(--success-100);color:var(--success-700)">soft</div><div class="name"><span class="hex">#16A34A</span></div></div>
<div class="col"><div class="solid" style="background:var(--warning-500)">warning</div><div class="soft" style="background:var(--warning-100);color:var(--warning-700)">soft</div><div class="name"><span class="hex">#F59E0B</span></div></div>
<div class="col"><div class="solid" style="background:var(--danger-500)">danger</div><div class="soft" style="background:var(--danger-100);color:var(--danger-700)">soft</div><div class="name"><span class="hex">#DC2626</span></div></div>
<div class="col"><div class="solid" style="background:var(--info-500)">info</div><div class="soft" style="background:var(--info-100);color:var(--info-700)">soft</div><div class="name"><span class="hex">#0EA5E9</span></div></div>
</body></html>
